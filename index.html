<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Musa System</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0a0a0a;
  color: white;
}

/* HERO */
.hero {
  position: relative;
  height: 100vh;
  display: flex;
  align-items: center;
  padding: 0 48px;
  overflow: hidden;
}

/* VIDEO */
.hero-video {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: 0;
  opacity: 0.45;
}

/* OVERLAY */
.hero-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(0,0,0,0.85));
  z-index: 1;
}

/* CONTENT */
.hero-content {
  position: relative;
  z-index: 2;
  max-width: 700px;
}

h1 {
  font-size: 72px;
  line-height: 0.9;
  margin-bottom: 24px;
}

.accent { color: #CC0000; }

.hero-sub {
  font-size: 18px;
  color: #ccc;
  margin-bottom: 32px;
}

.btn {
  padding: 14px 28px;
  border: 1px solid white;
  text-decoration: none;
  color: white;
  margin-right: 10px;
}

.btn-primary {
  background: #CC0000;
  border: none;
}
</style>
</head>

<body>

<section class="hero">

  <!-- VIDEO BACKGROUND -->
  <video class="hero-video" autoplay muted loop playsinline>
    <source src="7898649-hd_1920_1080_15fps.mp4" type="video/mp4">
  </video>

  <!-- OVERLAY -->
  <div class="hero-overlay"></div>

  <!-- CONTENT -->
  <div class="hero-content">
    <h1>
      Tu tienda<br>
      <span class="accent">B2B</span><br>
      sin límites
    </h1>

    <p class="hero-sub">
      Dejá de vender por WhatsApp. Automatizá tu canal B2B.
    </p>

    <a href="#" class="btn btn-primary">Quiero digitalizar</a>
    <a href="#" class="btn">Ver más</a>
  </div>

</section>

</body>
</html>
